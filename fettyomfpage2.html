document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>OMF26 · One More Forever — Fetty Wap Edition<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<style>/* OMF26 — local A24 font set (subset latin woff2 extracted from the brand bundle) */\n\n/* ---- Archivo (labels / sans) ---- */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 400 600;\n  font-display: swap;\n  src: url(\"155a1c3f-3e7b-43fe-86c4-bf10164d1c01\") format('woff2');\n}\n\n/* ---- Bodoni Moda (display) ---- */\n@font-face {\n  font-family: 'Bodoni Moda';\n  font-style: normal;\n  font-weight: 400 600;\n  font-display: swap;\n  src: url(\"c125938c-b962-42ec-b3ba-d5881047cb31\") format('woff2');\n}\n@font-face {\n  font-family: 'Bodoni Moda';\n  font-style: italic;\n  font-weight: 400 500;\n  font-display: swap;\n  src: url(\"5e636c68-fd97-48b2-af87-8b02010e45d7\") format('woff2');\n}\n\n/* ---- Cormorant Garamond (body) ---- */\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: normal;\n  font-weight: 400 600;\n  font-display: swap;\n  src: url(\"32d78667-c895-4204-bb4e-6def50c3ac13\") format('woff2');\n}\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: italic;\n  font-weight: 400 500;\n  font-display: swap;\n  src: url(\"e8460fa7-30f5-444f-bc15-c6177c93edb6\") format('woff2');\n}\n<\u002Fstyle>\n<style>/* ═══════════════════════════════════════════════════════════════════\n   OMF26 · ONE MORE FOREVER — Fetty Wap Edition\n   Cinematic A24 system: Bodoni / Cormorant / Archivo, near-black ink +\n   sodium amber, full-bleed pre-graded Paterson photography + 35mm grain.\n   Built on <deck-stage> (it sizes/positions each <section> to 1920×1080).\n   ═══════════════════════════════════════════════════════════════════ */\n\n:root {\n  --ink:        #0A0A0F;\n  --ink-deep:   #050507;\n  --oxblood:    #0E0C0A;\n  --amber:      #C9A961;\n  --amber-hot:  #E3C780;\n  --amber-deep: #A8863F;\n  --paper:      #ECE5D6;\n  --bone:       #b8b0a0;\n  --cream:      #F1EAD9;\n  --text-light: #ece2d0;\n  --text-muted: rgba(236, 226, 208, 0.6);\n  --hair:       rgba(236, 226, 208, 0.14);\n  --hair-amber: rgba(201, 169, 97, 0.32);\n\n  --display: \"Bodoni Moda\", \"Didot\", \"Times New Roman\", serif;\n  --body:    \"Cormorant Garamond\", \"EB Garamond\", Georgia, serif;\n  --label:   \"Archivo\", \"Helvetica Neue\", sans-serif;\n\n  /* type scale */\n  --type-cold: 132px;\n  --type-title: 84px;\n  --type-title-sm: 64px;\n  --type-epnum: 340px;\n  --type-lede: 33px;\n  --type-stat: 150px;\n  --type-body: 27px;\n  --type-label: 16px;\n\n  --pad-x: 130px;\n  --pad-y: 90px;\n}\n\n* { box-sizing: border-box; }\n\ndeck-stage:not(:defined) { visibility: hidden; }\nhtml, body { margin: 0; background: #000; }\ndeck-stage { background: #000; }\n\n/* ---------- The slide frame ---------- */\nsection {\n  overflow: hidden;\n  background: var(--ink);\n  color: var(--text-light);\n  font-family: var(--body);\n  -webkit-font-smoothing: antialiased;\n}\nsection.oxblood { background: var(--oxblood); }\nsection.deep    { background: var(--ink-deep); }\n\n/* full-bleed photography */\n.bg {\n  position: absolute; inset: 0;\n  width: 100%; height: 100%;\n  object-fit: cover; object-position: 50% 50%;\n  z-index: 0;\n  /* the supplied night photography is intentionally underexposed — lift it\n     so the streetlight glow reads through the scrims */\n  filter: brightness(1.42) contrast(1.02) saturate(1.08);\n}\n\n/* scrims — images are already graded dark; these only add text protection */\n.scrim { position: absolute; inset: 0; z-index: 1; pointer-events: none; }\n.scrim.editorial {\n  background:\n    linear-gradient(to top, rgba(8,8,11,0.9) 0%, rgba(8,8,11,0.5) 36%, rgba(8,8,11,0.08) 66%, rgba(8,8,11,0.14) 100%),\n    linear-gradient(to right, rgba(8,8,11,0.66), rgba(8,8,11,0.12) 58%, transparent 80%);\n}\n.scrim.data {\n  background:\n    linear-gradient(to bottom, rgba(8,8,11,0.5), rgba(8,8,11,0.66)),\n    radial-gradient(ellipse 90% 82% at 50% 46%, rgba(8,8,11,0.12), rgba(8,8,11,0.62));\n}\n.scrim.cinematic {\n  background:\n    linear-gradient(to top, rgba(8,8,11,0.92) 0%, rgba(8,8,11,0.44) 34%, rgba(8,8,11,0.06) 62%, rgba(8,8,11,0.38) 100%),\n    linear-gradient(to right, rgba(8,8,11,0.46), transparent 60%);\n}\n.scrim.center {\n  background: radial-gradient(ellipse 70% 60% at 50% 52%, rgba(8,8,11,0.62), rgba(8,8,11,0.9));\n}\n\n/* vignette + grain on every frame */\n.vignette {\n  position: absolute; inset: 0; z-index: 1; pointer-events: none;\n  background: radial-gradient(ellipse 94% 86% at 50% 50%, transparent 58%, rgba(0,0,0,0.45) 100%);\n}\n.grain {\n  position: absolute; inset: 0; z-index: 2; pointer-events: none;\n  opacity: 0.13; mix-blend-mode: overlay;\n  background-image: url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyNDAnIGhlaWdodD0nMjQwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45MicgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjxmZUNvbG9yTWF0cml4IHZhbHVlcz0nMCAwIDAgMCAwLjk1ICAwIDAgMCAwIDAuNyAgMCAwIDAgMCAwLjMgIDAgMCAwIDAuNiAwJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJy8+PC9zdmc+\");\n}\n\n/* ---------- Content frame ---------- */\n.inner {\n  position: absolute; inset: 0;\n  z-index: 3;\n  padding: var(--pad-y) var(--pad-x);\n  display: flex;\n  flex-direction: column;\n}\n.topbar {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  font-family: var(--label);\n  font-size: var(--type-label);\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  flex: 0 0 auto;\n}\n.topbar .folio { color: var(--amber); white-space: nowrap; }\n.topbar .brand { color: var(--text-muted); font-size: 14px; letter-spacing: 0.24em; white-space: nowrap; }\n\n.body {\n  flex: 1 1 auto;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  min-height: 0;\n}\n.body.top { justify-content: flex-start; padding-top: 30px; }\n.body.bottom { justify-content: flex-end; }\n\n/* ---------- Type ---------- */\nh1.title {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: var(--type-title);\n  line-height: 1.0;\n  letter-spacing: -0.02em;\n  color: var(--cream);\n  margin: 0;\n  max-width: 22ch;\n  text-wrap: balance;\n}\nh1.title.sm { font-size: var(--type-title-sm); }\nh1.title em { font-style: italic; font-weight: 400; color: var(--amber); }\n\n.lede {\n  font-family: var(--body);\n  font-size: var(--type-lede);\n  line-height: 1.5;\n  color: var(--text-light);\n  margin: 36px 0 0;\n  max-width: 54ch;\n}\n.lede.narrow { max-width: 40ch; }\n.lede em { font-style: italic; color: var(--amber-hot); }\n\n.label {\n  font-family: var(--label);\n  font-size: var(--type-label);\n  letter-spacing: 0.3em;\n  text-transform: uppercase;\n  color: var(--amber);\n  margin: 0 0 26px;\n  display: block;\n}\n\n/* ---------- Cold open / cinematic ---------- */\n.kicker {\n  font-family: var(--label);\n  font-size: 16px;\n  letter-spacing: 0.4em;\n  text-transform: uppercase;\n  color: var(--amber);\n  display: flex; align-items: center; gap: 18px;\n  margin-bottom: 40px;\n}\n.kicker::before { content: \"\"; width: 52px; height: 1px; background: currentColor; }\n.cold-title {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: var(--type-cold);\n  line-height: 0.94;\n  letter-spacing: -0.025em;\n  color: var(--cream);\n  margin: 0;\n  max-width: 16ch;\n}\n.cold-title em { font-style: italic; font-weight: 400; color: var(--amber); }\n.cold-sub {\n  font-family: var(--display);\n  font-style: italic;\n  font-size: 40px;\n  line-height: 1.3;\n  color: var(--paper);\n  margin: 38px 0 0;\n  max-width: 34ch;\n}\n.cold-terms {\n  font-family: var(--label);\n  font-size: 18px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--cream);\n  margin-top: 50px;\n}\n.cold-terms .amber { color: var(--amber); }\n/* lift cold-slide content so it clears the absolute footer line */\n.cold .body.bottom { padding-bottom: 130px; }\n.cold-foot {\n  position: absolute; z-index: 3;\n  left: var(--pad-x); bottom: 50px;\n  font-family: var(--label);\n  font-size: 14px;\n  letter-spacing: 0.3em;\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n/* ---------- Episode slides ---------- */\n.epnum {\n  position: absolute;\n  z-index: 2;\n  font-family: var(--display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: var(--type-epnum);\n  line-height: 0.7;\n  letter-spacing: -0.04em;\n  color: rgba(201,169,97,0.13);\n  right: var(--pad-x);\n  top: 120px;\n  pointer-events: none;\n  user-select: none;\n}\n.ep-kicker {\n  font-family: var(--label);\n  font-size: 17px;\n  letter-spacing: 0.42em;\n  text-transform: uppercase;\n  color: var(--amber);\n  display: flex; align-items: center; gap: 18px;\n  margin-bottom: 26px;\n}\n.ep-kicker::before { content: \"\"; width: 46px; height: 1px; background: currentColor; }\nh1.ep-title {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 104px;\n  line-height: 0.94;\n  letter-spacing: -0.025em;\n  color: var(--cream);\n  margin: 0;\n  max-width: 16ch;\n}\nh1.ep-title em { font-style: italic; font-weight: 400; color: var(--amber); }\n.ep-quote {\n  font-family: var(--display);\n  font-style: italic;\n  font-size: 34px;\n  line-height: 1.3;\n  color: var(--paper);\n  margin: 34px 0 0;\n  max-width: 38ch;\n}\n\n/* spec strip (acts / roles) */\n.specrow {\n  display: grid;\n  gap: 40px;\n  margin-top: 52px;\n}\n.specrow.c3 { grid-template-columns: repeat(3, 1fr); }\n.specrow.c4 { grid-template-columns: repeat(4, 1fr); }\n.spec {\n  display: flex; flex-direction: column; gap: 12px;\n  padding-top: 24px;\n  border-top: 1px solid var(--hair-amber);\n}\n.spec .sk {\n  font-family: var(--label); font-size: 14px; letter-spacing: 0.2em;\n  text-transform: u ight: 1.3; color: var(--text-light);\n  padding: 7px 0; border-top: 1px solid var(--hair);\n}\n\n/* ---------- Closer ---------- */\n.closer {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 120px;\n  line-height: 0.98;\n  letter-spacing: -0.02em;\n  color: var(--cream);\n  margin: 0;\n  max-width: 14ch;\n}\n.closer em { font-style: italic; font-weight: 400; color: var(--amber); }\n.closer-sub {\n  font-family: var(--display);\n  font-style: italic;\n  font-size: 40px;\n  line-height: 1.3;\n  color: var(--paper);\n  margin: 36px 0 0;\n  max-width: 34ch;\n}\n\n/* ---------- Entrance animation ---------- */\n/* Entrance: transform-only so the visible end-state is the base style.\n   Content is never hidden by opacity — survives print, reduced-motion, and\n   non-compositing capture/export render paths. */\n.anim { opacity: 1; }\n@media (prefers-reduced-motion: no-preference) {\n  [data-deck-active] .anim {\n    animation: rise 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) both;\n  }\n  [data-deck-active] .anim.d1 { animation-delay: 0.06s; }\n  [data-deck-active] .anim.d2 { animation-delay: 0.14s; }\n  [data-deck-active] .anim.d3 { animation-delay: 0.22s; }\n  [data-deck-active] .anim.d4 { animation-delay: 0.30s; }\n}\n@keyframes rise {\n  from { transform: translateY(24px); }\n  to   { transform: translateY(0); }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ═════════ 01 · COVER ═════════ -->\n  <section class=\"cold\" data-label=\"Cover\">\n    <img class=\"bg\" src=\"152be568-43ce-4b65-b2c6-c444bbb8b13c\" alt=\"Paterson skyline at dusk\">\n    <div class=\"scrim cinematic\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner body bottom\">\n      <div class=\"kicker anim\">One More Forever · 2026 · Paterson, New Jersey<\u002Fdiv>\n      <h1 class=\"cold-title anim d1\">OMF<em>26<\u002Fem><\u002Fh1>\n      <p class=\"cold-sub anim d2\">The show where fans don't just watch. They invest. They build. <em style=\"color:var(--amber)\">They own it.<\u002Fem><\u002Fp>\n      <div class=\"cold-terms anim d3\"><span class=\"amber\">IPX<\u002Fspan> &nbsp;·&nbsp; Final Assembly &nbsp;·&nbsp; Live Brand Systems<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cold-foot\">The last time fans got to own a piece of what they loved was never. Until now.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 02 · THE PREMISE ═════════ -->\n  <section data-label=\"The Premise\">\n    <img class=\"bg\" src=\"22ace15a-d641-4876-b4d9-acc8f91fa000\" alt=\"Streetlamp over a brick rowhouse at night\">\n    <div class=\"scrim editorial\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Premise<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <h1 class=\"title anim\">Fans have been watching <em>from the sidelines.<\u002Fem><\u002Fh1>\n        <p class=\"lede anim d1\">The Apprentice. Shark Tank. The Profit. Every show where the audience watched someone else build an empire — and went home empty-handed. OMF26 changes the contract between creators and fans.<\u002Fp>\n        <div class=\"statrow anim d2\">\n          <div class=\"stat\"><span class=\"num\">$500<small>B+<\u002Fsmall><\u002Fspan><span class=\"slabel\">Creator economy market.<\u002Fspan><\u002Fdiv>\n          <div class=\"stat\"><span class=\"num\">320<small>M+<\u002Fsmall><\u002Fspan><span class=\"slabel\">Fans who follow celebrity brand stories online each year.<\u002Fspan><\u002Fdiv>\n          <div class=\"stat\"><span class=\"num zero\">0<\u002Fspan><span class=\"slabel\">Shows that let fans invest in real time as the product is built.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 03 · THE SHOW ═════════ -->\n  <section class=\"deep\" data-label=\"The Show\">\n    <img class=\"bg\" src=\"2f38add4-f3ff-4580-b66e-5273701b687a\" alt=\"Open loading-bay door glowing in a dark warehouse\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Show<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">OMF26: <em>One More Forever.<\u002Fem><\u002Fh1>\n        <p class=\"lede anim d1\" style=\"margin-top:18px;\">A multi-episode docuseries co-owned by IPX, Final Assembly, and the celebrity — where fans invest in a real product launch as it happens.<\u002Fp>\n        <div class=\"slate anim d2\">\n          <div class=\"ep-card\"><span class=\"en\">01<\u002Fspan><div><h3>Mini-Documentary Origin<\u002Fh3><p>The celebrity's real story. The problem they lived. The moment it all started.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">02<\u002Fspan><div><h3>The Lab<\u002Fh3><p>Inside Final Assembly. Prototypes, failures, pivots — the messy truth of building.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">03<\u002Fspan><div><h3>Festival Truth<\u002Fh3><p>Real fans. Live events. Brutally honest reactions. The product evolves in public.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">04<\u002Fspan><div><h3>Fan Shark Tank via IPX<\u002Fh3><p>Fans become investors. Real money. Real stakes. Real partnership.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">05<\u002Fspan><div><h3>The Wait<\u002Fh3><p>Manufacturing drama. Waitlists. Delays. Will it ship? The ultimate cliffhanger.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">06<\u002Fspan><div><h3>The Retail Reckoning<\u002Fh3><p>Pitching the buyers. JD Sports. Foot Locker. A second Shark Tank moment.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 04 · EPISODE 01 ═════════ -->\n  <section data-label=\"Ep 01 · Origin Story\">\n    <img class=\"bg\" src=\"2fbb565d-92b1-4c3a-bc23-8661a8c9a762\" alt=\"A door half-open with warm light spilling across a dark floor\">\n    <div class=\"scrim editorial\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"epnum\">01<\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Episode One<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"ep-kicker anim\">Origin Story<\u002Fdiv>\n        <h1 class=\"ep-title anim d1\">Sell the place, <em>not just the face.<\u002Fem><\u002Fh1>\n        <p class=\"ep-quote anim d2\">\"Everyone has a moment — the moment they knew something was broken. We go find that moment.\"<\u002Fp>\n        <div class=\"specrow c3 anim d3\">\n          <div class=\"spec\"><span class=\"sk\">Act I · The Wound<\u002Fspan><span class=\"sv\">Back to Paterson. The block, the corners, the people who were there before the music. Shot where it happened.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">Act II · The Search<\u002Fspan><span class=\"sv\">Every endorsement that fell flat, every product that felt like merch. Each dead end is a story beat.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">Act III · The Spark<\u002Fspan><span class=\"sv\">Paterson becomes the brand, not the backdrop. The sketch on a napkin — captured on camera.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 05 · EPISODE 02 ═════════ -->\n  <section class=\"oxblood\" data-label=\"Ep 02 · The Lab\">\n    <img class=\"bg\" src=\"c143bd6a-bea6-4541-889b-e04fc28a6900\" alt=\"Brick mill facade with a single lit window\">\n    <div class=\"scrim editorial\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"epnum\">02<\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Episode Two<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"ep-kicker anim\">The Lab<\u002Fdiv>\n        <h1 class=\"ep-title anim d1\">The audience is watching <em>through the keyhole.<\u002Fem><\u002Fh1>\n        <p class=\"ep-quote anim d2\">Fetty Wap walks into Final Assembly for the first time. The first hoodie sample is wrong — that's the point.<\u002Fp>\n        <div class=\"specrow c4 anim d3\">\n          <div class=\"spec\"><span class=\"sk\">Product Development<\u002Fspan><span class=\"sv\">28 SKUs from sketch to sample to hero piece.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">The Story Frame<\u002Fspan><span class=\"sv\">The workshop is the set. Every iteration is a scene.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">Mfg Network<\u002Fspan><span class=\"sv\">Tultex, NYC cut-and-sew, embroidery houses — fast.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">Content Capture<\u002Fspan><span class=\"sv\">Every meeting, every failure, every breakthrough.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 06 · EPISODE 03 ═════════ -->\n  <section data-label=\"Ep 03 · Festival Truth\">\n    <img class=\"bg\" src=\"2d57cdbd-5fc0-4b35-aee5-ef115445a63a\" alt=\"Chain-link fence and streetlight at night\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"epnum\">03<\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Episode Three<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <div class=\"ep-kicker anim\">Festival Truth<\u002Fdiv>\n        <h1 class=\"ep-title anim d1\" style=\"font-size:84px;\">The fans are <em>the only judges that matter.<\u002Fem><\u002Fh1>\n        <p class=\"ep-quote anim d2\" style=\"margin-top:24px;\">LBS deploys the drops at live festivals — raw reactions captured on camera. The hero piece earns its spot at retail, or it doesn't ship.<\u002Fp>\n        <div class=\"statrow anim d3\" style=\"margin-top:48px;\">\n          <div class=\"stat\"><span class=\"num\">30<small>K+<\u002Fsmall><\u002Fspan><span class=\"slabel\">Daily festival attendees.<\u002Fspan><\u002Fdiv>\n          <div class=\"stat\"><span class=\"num\">500<small>K<\u002Fsmall><\u002Fspan><span class=\"slabel\">Attendees per festival tour.<\u002Fspan><\u002Fdiv>\n          <div class=\"stat\"><span class=\"num\">5–10<\u002Fspan><span class=\"slabel\">Product variants live-tested per activation.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 07 · EPISODE 04 ═════════ -->\n  <section class=\"deep\" data-label=\"Ep 04 · The Fan Shark Tank\">\n    <img class=\"bg\" src=\"d6cfe67f-aec1-4b26-8fef-322f23a5b5b1\" alt=\"Railroad tracks and boxcars under sodium light\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"epnum\">04<\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Episode Four<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"ep-kicker anim\">The Fan Shark Tank<\u002Fdiv>\n        <h1 class=\"ep-title anim d1\">The moment every episode <em>builds toward.<\u002Fem><\u002Fh1>\n        <div class=\"threeup anim d2\" style=\"margin-top:48px;\">\n          <div class=\"col\"><span class=\"colhead\">01 · The Pitch<\u002Fspan><h3>Fetty pitches his fans<\u002Fh3><p>Not investors in suits. He looks into the camera and pitches the people who've been with him since 'Trap Queen.'<\u002Fp><\u002Fdiv>\n          <div class=\"col featured\"><span class=\"colhead\">02 · The Rails<\u002Fspan><h3>Fans invest via IPX<\u002Fh3><p>Scan a QR code. See the product, the Paterson story, the $1.5M–$2M raise. Choose how much. Become a co-owner.<\u002Fp><\u002Fdiv>\n          <div class=\"col\"><span class=\"colhead\">03 · The Meter<\u002Fspan><h3>The numbers go live<\u002Fh3><p>$0. $200K. $1M. Live. Real-time totals on screen. The tension is unscripted — because it's real.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 08 · EPISODE 05 ═════════ -->\n  <section data-label=\"Ep 05 · The Wait\">\n    <img class=\"bg\" src=\"dff12c9e-bbb0-4370-aa7c-7c051460f592\" alt=\"Wet residential street with car headlights at night\">\n    <div class=\"scrim editorial\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"epnum\">05<\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Episode Five<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"ep-kicker anim\">The Wait<\u002Fdiv>\n        <h1 class=\"ep-title anim d1\">The waitlist <em>is ticking.<\u002Fem><\u002Fh1>\n        <p class=\"ep-quote anim d2\">A 28-SKU first drop that's never been manufactured before has to ship by a date that is very, very real.<\u002Fp>\n        <div class=\"specrow c4 anim d3\">\n          <div class=\"spec\"><span class=\"sk\">The Midnight Call<\u002Fspan><span class=\"sv\">The embroidery house is behind. First run: 200 hoodies marked B-grade.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">The Slip<\u002Fspan><span class=\"sv\">Ship date pushed two weeks. Fans start asking.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">The Promise<\u002Fspan><span class=\"sv\">Fetty posts: \"We're going to make this right.\"<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">The First Box<\u002Fspan><span class=\"sv\">A fan in Paterson opens it on camera.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 09 · EPISODE 06 ═════════ -->\n  <section class=\"oxblood\" data-label=\"Ep 06 · The Retail Reckoning\">\n    <img class=\"bg\" src=\"d1cc1eb8-a2f9-434c-ab30-ed071984ccad\" alt=\"An empty playground at night\">\n    <div class=\"scrim editorial\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"epnum\">06<\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Episode Six<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"ep-kicker anim\">The Retail Reckoning<\u002Fdiv>\n        <h1 class=\"ep-title anim d1\">The second <em>Shark Tank.<\u002Fem><\u002Fh1>\n        <p class=\"ep-quote anim d2\">The product is real. The fans have invested. Now we walk into the rooms that decide whether this lives on shelves.<\u002Fp>\n        <div class=\"specrow c4 anim d3\">\n          <div class=\"spec\"><span class=\"sk\">The Buyer Meeting<\u002Fspan><span class=\"sv\">JD Sports, live on camera. \"We love the story, but the price point…\"<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">The Data Lands<\u002Fspan><span class=\"sv\">IPX fan data hits the buyer's desk — 50K committed fans.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">The First Yes<\u002Fspan><span class=\"sv\">JD Sports commits for Year 2.<\u002Fspan><\u002Fdiv>\n          <div class=\"spec\"><span class=\"sk\">The Doors Open<\u002Fspan><span class=\"sv\">The fans who invested are now in 200+ doors nationwide.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 10 · LAUNCH DAY ═════════ -->\n  <section class=\"cold\" data-label=\"Launch Day\">\n    <img class=\"bg\" src=\"40fcc1b3-cebf-4503-9fbe-23ae64cf39f7\" alt=\"Railway overpass at night with rising steam\">\n    <div class=\"scrim cinematic\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner body bottom\">\n      <div class=\"kicker anim\">The Finale<\u002Fdiv>\n      <h1 class=\"cold-title anim d1\" style=\"font-size:150px;\">Launch <em>day.<\u002Fem><\u002Fh1>\n      <p class=\"cold-sub anim d2\">The fans built it. The fans own it. Today, the world finds out what Paterson already knew.<\u002Fp>\n      <div class=\"cold-terms anim d3\">The show ends. <span class=\"amber\">The brand begins.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cold-foot\">Season 1 closes. Season 2 casts the next celebrity. The IPX flywheel accelerates.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 11 · THE BLUEPRINT ═════════ -->\n  <section class=\"deep\" data-label=\"The Blueprint\">\n    <img class=\"bg\" src=\"39ac1253-1e12-4a2e-ab6f-3ed9d9688b51\" alt=\"A lit lamp on a bare brick wall\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Case Study<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">Fetty Wap is <em>the blueprint.<\u002Fem><\u002Fh1>\n        <p class=\"lede anim d1\" style=\"margin-top:18px;\">A New Jersey artist with a decade of cultural impact, millions of loyal fans, and a place-based story the industry never let him tell at scale.<\u002Fp>\n        <div class=\"threeup anim d2\">\n          <div class=\"col\"><span class=\"colhead\">The Origin<\u002Fspan><h3>Paterson, untold<\u002Fh3><p>A city that produced a sound that conquered the world while the place stayed invisible. Fans who think they know Fetty see a side that makes them love him more.<\u002Fp><\u002Fdiv>\n          <div class=\"col\"><span class=\"colhead\">The Product<\u002Fspan><h3>Co-created live<\u002Fh3><p>28-SKU launch, festival-tested with his own fanbase, hero outerwear refined on camera. By launch, it's built with the people who matter most.<\u002Fp><\u002Fdiv>\n          <div class=\"col featured\"><span class=\"colhead\">The IPX Triple Play<\u002Fspan><h3>One investment, three returns<\u002Fh3><p>Fans invest via IPX — $1.5M–$2M raise, $30M–$45M target exit. IPX co-owns the show IP. The show promotes every future Fetty-adjacent project.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 12 · WHY IPX ═════════ -->\n  <section data-label=\"Why IPX\">\n    <img class=\"bg\" src=\"9f303ca3-b7c9-4c75-95fe-227c0080aa37\" alt=\"Paterson rooftops and skyline at night\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Case for IPX<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">OMF26 is IPX's <em>best possible product.<\u002Fem><\u002Fh1>\n        <div class=\"numrows anim d1\">\n          <div class=\"nrow\"><span class=\"nn\">01<\u002Fspan><div><h3>Product investment platform<\u002Fh3><p>Every product built on OMF26 runs through IPX rails. With Fetty Wap as Season 1, that's a built-in audience emotionally and financially invested in his Paterson brand from drop one.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"nrow\"><span class=\"nn\">02<\u002Fspan><div><h3>Co-owned show IP<\u002Fh3><p>IPX co-owns OMF26 alongside Final Assembly and the celebrity — every episode, every season, every rights deal. Not sponsorship. Ownership of a franchise that compounds with every launch.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"nrow\"><span class=\"nn\">03<\u002Fspan><div><h3>Celebrity ecosystem amplifier<\u002Fh3><p>OMF26 spotlights the celebrity and drives investment across their entire portfolio. Every tour date, every collab, every future IPX project gets amplified by the audience the show builds.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 13 · REVENUE MODEL ═════════ -->\n  <section class=\"oxblood\" data-label=\"The Revenue Model\">\n    <img class=\"bg\" src=\"caad7de4-5137-41b3-a730-f0a15e305792\" alt=\"A wet empty street receding into darkness\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Revenue Model<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">Multiple streams. <em>One investment.<\u002Fem><\u002Fh1>\n        <div class=\"streams anim d1\">\n          <div class=\"stream\"><div class=\"sh\">Platform fees<\u002Fdiv><p>Every fan who invests through IPX generates fee revenue. OMF26 is the funnel — hundreds of thousands of primed fans.<\u002Fp><\u002Fdiv>\n          <div class=\"stream\"><div class=\"sh\">Equity in the brand<\u002Fdiv><p>IPX holds equity in every product brand. With Fetty: 40% of a brand modeling to a $30M–$45M exit.<\u002Fp><\u002Fdiv>\n          <div class=\"stream\"><div class=\"sh\">Show IP ownership<\u002Fdiv><p>Co-ownership of OMF26 as a media property. Streaming, international rights, Season 2 on. An appreciating asset.<\u002Fp><\u002Fdiv>\n          <div class=\"stream\"><div class=\"sh\">Fan data &amp; insights<\u002Fdiv><p>Behavioral investment data from fans who put real money behind real products — the industry standard for fan-financed launches.<\u002Fp><\u002Fdiv>\n          <div class=\"stream\"><div class=\"sh\">Portfolio amplification<\u002Fdiv><p>Each celebrity brings their audience to IPX — investable across every opportunity. Fetty's fans become Season 2's fans.<\u002Fp><\u002Fdiv>\n          <div class=\"stream\"><div class=\"sh\">Product margin share<\u002Fdiv><p>The George Foreman model: long-tail royalties that can eclipse upfront fees. The Fetty brand projects $24.8M Y5 revenue.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 14 · THE ECOSYSTEM ═════════ -->\n  <section class=\"deep\" data-label=\"The Ecosystem\">\n    <img class=\"bg\" src=\"c6553fcd-863f-442d-9b71-f6eaa96410c1\" alt=\"Sewing tables in a dim factory workroom\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Ecosystem Play<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">A PR machine for <em>everything else IPX touches.<\u002Fem><\u002Fh1>\n        <p class=\"lede anim d1\" style=\"margin-top:18px;\">When the world watches Fetty build a brand in Paterson, they don't just invest in streetwear. They invest in Fetty — and every other IPX touchpoint gets a tailwind money can't buy.<\u002Fp>\n        <div class=\"flow anim d2\">\n          <div class=\"node\"><span class=\"fn\">01<\u002Fspan><h4>Show viewership<\u002Fh4><p>Millions follow the journey.<\u002Fp><\u002Fdiv>\n          <div class=\"node\"><span class=\"fn\">02<\u002Fspan><h4>Product investment (IPX)<\u002Fh4><p>Fans put real money in via IPX rails.<\u002Fp><\u002Fdiv>\n          <div class=\"node\"><span class=\"fn\">03<\u002Fspan><h4>Tour + collab demand ↑<\u002Fh4><p>The show drives live events and future drops.<\u002Fp><\u002Fdiv>\n          <div class=\"node\"><span class=\"fn\">04<\u002Fspan><h4>Other IPX projects<\u002Fh4><p>A new audience discovers the full ecosystem.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 15 · THE HOOKS ═════════ -->\n  <section data-label=\"The Hooks\">\n    <img class=\"bg\" src=\"37617f8e-be87-4523-ab47-f43d449fb56a\" alt=\"A lit doorway at the end of a dark corridor\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Hook Architecture<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">Why they come back <em>every week.<\u002Fem><\u002Fh1>\n        <p class=\"lede anim d1\" style=\"margin-top:16px;\">Every great show runs on unresolved tension. OMF26 has an unfair advantage — the tension is real.<\u002Fp>\n        <div class=\"slate anim d2\" style=\"margin-top:44px;\">\n          <div class=\"ep-card\"><span class=\"en\">01<\u002Fspan><div><h3>Emotional hook<\u002Fh3><p>Will Fetty really go this deep on Paterson — the losses, the wins he never talked about?<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">02<\u002Fspan><div><h3>Product hook<\u002Fh3><p>Will the first hoodie sample actually work? The prototype looked nothing like the vision.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">03<\u002Fspan><div><h3>Crisis hook<\u002Fh3><p>The fans at the festival hated the embroidery placement. Now what?<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">04<\u002Fspan><div><h3>Financial hook<\u002Fh3><p>The investment counter goes live. Will fans show up? $0. $200K. $1M.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">05<\u002Fspan><div><h3>Cliffhanger hook<\u002Fh3><p>Day of shipping: the manufacturer emails. There's a problem with the hero piece.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">06<\u002Fspan><div><h3>Stakes hook<\u002Fh3><p>The JD Sports buyer just asked a question Fetty's team didn't prepare for.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 16 · THE FLYWHEEL ═════════ -->\n  <section class=\"oxblood\" data-label=\"The Flywheel\">\n    <img class=\"bg\" src=\"1c5db0f8-8529-4f2c-91eb-a40a29d6c9c3\" alt=\"A dim industrial interior under a single lamp\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The OMF26 Flywheel<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">Once it starts spinning, <em>you can't stop it.<\u002Fem><\u002Fh1>\n        <div class=\"slate anim d1\" style=\"margin-top:50px;\">\n          <div class=\"ep-card\"><span class=\"en\">01<\u002Fspan><div><h3>The story<\u002Fh3><p>Fetty joins OMF26 with an authentic Paterson story.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">02<\u002Fspan><div><h3>The audience<\u002Fh3><p>The show builds an audience before the product exists.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">03<\u002Fspan><div><h3>The investment<\u002Fh3><p>Fans invest via IPX — emotionally and financially.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">04<\u002Fspan><div><h3>The launch<\u002Fh3><p>Product ships with a pre-built audience + $1.8M capital.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">05<\u002Fspan><div><h3>The next season<\u002Fh3><p>Brand success funds the next celebrity season.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"ep-card\"><span class=\"en\">06<\u002Fspan><div><h3>The compounding<\u002Fh3><p>More fans, more data, more deals. The wheel grows.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 17 · THE BENCHMARK ═════════ -->\n  <section class=\"deep\" data-label=\"The Benchmark\">\n    <img class=\"bg\" src=\"0bc81afd-8c09-4982-8702-d552ba994bbe\" alt=\"A narrow alley lit by a lone streetlight\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Benchmark<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div style=\"display:grid; grid-template-columns: 0.9fr 1.1fr; gap:90px; align-items:center;\">\n          <div>\n            <span class=\"label anim\">George Foreman made<\u002Fspan>\n            <p class=\"bignum anim d1\">$137<small>M+<\u002Fsmall><\u002Fp>\n            <p class=\"lede anim d2\" style=\"margin-top:30px; max-width:30ch;\">…from a grill. He aligned an authentic story to a product that solved a real problem. 100 million units sold. OMF26 is that story, told in real time — with fans as partners.<\u002Fp>\n          <\u002Fdiv>\n          <table class=\"vs anim d3\">\n            <tbody><tr><td class=\"x\">Upfront cash for celebrity<\u002Ftd><td class=\"o\">Long-term equity + royalty<\u002Ftd><\u002Ftr>\n            <tr><td class=\"x\">No fan participation<\u002Ftd><td class=\"o\">Fans are financial partners<\u002Ftd><\u002Ftr>\n            <tr><td class=\"x\">Product guesswork<\u002Ftd><td class=\"o\">Live festival data + iteration<\u002Ftd><\u002Ftr>\n            <tr><td class=\"x\">One revenue stream<\u002Ftd><td class=\"o\">Product + show IP + platform<\u002Ftd><\u002Ftr>\n            <tr><td class=\"x\">Celebrity endorsement only<\u002Ftd><td class=\"o\">Co-ownership at every level<\u002Ftd><\u002Ftr>\n          <\u002Ftbody><\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 18 · OWNERSHIP ═════════ -->\n  <section data-label=\"Ownership\">\n    <img class=\"bg\" src=\"b71dad84-8c9d-4cbc-b37f-8840c98bfecd\" alt=\"An open box-truck at a loading dock at night\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">Ownership Structure<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">Who owns <em>what.<\u002Fem><\u002Fh1>\n        <p class=\"lede anim d1\" style=\"margin-top:14px;\">Three parties. Three aligned incentives. One shared mission: build something that lasts.<\u002Fp>\n        <div class=\"takehome anim d2\">\n          <div class=\"row lead\"><div><div class=\"party\">IPX<\u002Fdiv><div class=\"detail\">40% equity at close + platform fees on all fan investment + co-ownership of show IP + fan data. On $1.8M deployed → 8.3× MOIC, base case.<\u002Fdiv><\u002Fdiv><div class=\"amt\">15.0M<\u002Fdiv><\u002Fdiv>\n          <div class=\"row\"><div><div class=\"party\">Final Assembly<\u002Fdiv><div class=\"detail\">30% equity at close + 5% management fee on revenue + revenue share on festival retail + the manufacturing network.<\u002Fdiv><\u002Fdiv><div class=\"amt\">14.9M<\u002Fdiv><\u002Fdiv>\n          <div class=\"row\"><div><div class=\"party\">Fetty Wap Entity<\u002Fdiv><div class=\"detail\">25% brand equity + 3% royalty on net product sales + co-ownership of his episodes + fan-community LTV.<\u002Fdiv><\u002Fdiv><div class=\"amt\">11.6M<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"lede anim d3\" style=\"font-family:var(--label); font-size:15px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-top:24px;\">Modeled 5-year all-in per party · base case<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 19 · THE TIMELINE ═════════ -->\n  <section class=\"oxblood\" data-label=\"The Timeline\">\n    <img class=\"bg\" src=\"6e2f74b4-0aff-4a7a-a7d5-f5aeb3528305\" alt=\"A wet residential street under streetlights\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Timeline<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">From greenlight <em>to launch.<\u002Fem><\u002Fh1>\n        <div class=\"phases anim d1\">\n          <div class=\"phase\"><div class=\"pk\">Phase 0<\u002Fdiv><h4>Greenlight<\u002Fh4><div class=\"pm\">Month 1<\u002Fdiv><ul><li>IPX commits resources<\u002Fli><li>Fetty signed for Season 1<\u002Fli><li>OMF26 framework signed<\u002Fli><li>Final Assembly onboarded<\u002Fli><\u002Ful><\u002Fdiv>\n          <div class=\"phase\"><div class=\"pk\">Phase 1<\u002Fdiv><h4>Origin Shoot<\u002Fh4><div class=\"pm\">Month 2–3<\u002Fdiv><ul><li>Paterson documentary footage<\u002Fli><li>First 28-SKU prototypes<\u002Fli><li>Lab footage at Final Assembly<\u002Fli><li>Fetty story arc captured<\u002Fli><\u002Ful><\u002Fdiv>\n          <div class=\"phase\"><div class=\"pk\">Phase 2<\u002Fdiv><h4>Festival Truth<\u002Fh4><div class=\"pm\">Month 4–6<\u002Fdiv><ul><li>3 LBS festival activations<\u002Fli><li>Live fan feedback loop<\u002Fli><li>Hero outerwear identified<\u002Fli><li>IPX pre-launch funnel fills<\u002Fli><\u002Ful><\u002Fdiv>\n          <div class=\"phase\"><div class=\"pk\">Phase 3<\u002Fdiv><h4>Fan Shark Tank<\u002Fh4><div class=\"pm\">Month 7<\u002Fdiv><ul><li>IPX investment opens<\u002Fli><li>Episode releases begin<\u002Fli><li>Real-time investment drama<\u002Fli><li>Waitlist builds<\u002Fli><\u002Ful><\u002Fdiv>\n          <div class=\"phase\"><div class=\"pk\">Phase 4<\u002Fdiv><h4>Launch Day<\u002Fh4><div class=\"pm\">Month 10–12<\u002Fdiv><ul><li>28-SKU drop ships<\u002Fli><li>JD Sports + retail meetings<\u002Fli><li>Season finale airs<\u002Fli><li>Season 2 announced<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 20 · THE ASK ═════════ -->\n  <section class=\"deep\" data-label=\"The Ask\">\n    <img class=\"bg\" src=\"350a721f-8961-44a3-b15f-fb3121b421b5\" alt=\"A lamplit path beneath bare trees at night\">\n    <div class=\"scrim data\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"topbar\"><span class=\"folio\">The Ask<\u002Fspan><span class=\"brand\">OMF26 · One More Forever · Paterson, NJ<\u002Fspan><\u002Fdiv>\n      <div class=\"body top\">\n        <h1 class=\"title sm anim\">How big do you <em>want to play?<\u002Fem><\u002Fh1>\n        <div class=\"numrows anim d1\" style=\"margin-top:34px;\">\n          <div class=\"nrow\"><span class=\"nn\">01<\u002Fspan><div><h3>Investment in production &amp; the product launch<\u002Fh3><p>IPX co-funds the OMF26 pilot season plus the $1.5M–$2M raise for the brand — offset by fans investing on the IPX platform. Costs shared. IP shared. Upside shared.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"nrow\"><span class=\"nn\">02<\u002Fspan><div><h3>The IPX platform as the investment rails<\u002Fh3><p>All fan investment in OMF26 brands runs through IPX exclusively. The show is the acquisition funnel at a scale no paid campaign could match.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"nrow\"><span class=\"nn\">03<\u002Fspan><div><h3>PR &amp; marketing push<\u002Fh3><p>IPX commits media presence to the launch. Every piece of press for the show is press for IPX. Co-branded campaigns. Social amplification.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"nrow\"><span class=\"nn\">04<\u002Fspan><div><h3>Time &amp; relationship capital<\u002Fh3><p>Access to IPX's celebrity relationships to recruit Season 2 talent. As a group, we decide which celebrities fit best.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 21 · CLOSER ═════════ -->\n  <section class=\"cold\" data-label=\"Closer\">\n    <img class=\"bg\" src=\"38a46a4b-6aa0-454e-8335-08bf0874a32b\" alt=\"A bridge over the river with city lights beyond\">\n    <div class=\"scrim cinematic\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"inner body bottom\">\n      <h1 class=\"closer anim\">The fans have been <em>waiting for this.<\u002Fem><\u002Fh1>\n      <p class=\"closer-sub anim d1\">They just didn't know they were waiting.<\u002Fp>\n      <div class=\"cold-terms anim d2\" style=\"margin-top:42px;\">OMF26 · IPX · Final Assembly · <span class=\"amber\">Live Brand Systems<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cold-foot\">Let's build something that lasts.<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<
